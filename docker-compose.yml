version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: casehub-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: casehub
    ports:
      - "5432:5432"
    volumes:
      - casehub-postgres-data:/var/lib/postgresql/data

volumes:
  casehub-postgres-data:
