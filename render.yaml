# CaseHub — full stack on Render (staging + production)
# Staging:  branch `staging`  → *-staging services
# Production: branch `main`    → production services
#
# DB seed runs automatically during API build (Shell requires paid plan on Render).
# Set CLERK_SECRET_KEY on both API services in the Render dashboard.
# Set VITE_CLERK_PUBLISHABLE_KEY on both static sites in the Render dashboard.

databases:
  - name: casehub-db-staging
    plan: free
    databaseName: casehub_staging
    user: casehub

  - name: casehub-db
    plan: free
    databaseName: casehub
    user: casehub

services:
  # ── STAGING API ──────────────────────────────────────────
  - type: web
    name: casehub-api-staging
    runtime: node
    plan: free
    branch: staging
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: casehub-db-staging
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://casehub-web-staging.onrender.com,http://localhost:5173
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false

  # ── STAGING FRONTEND ─────────────────────────────────────
  - type: web
    name: casehub-web-staging
    runtime: static
    branch: staging
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://casehub-api-staging.onrender.com
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

  # ── PRODUCTION API ───────────────────────────────────────
  - type: web
    name: casehub-api
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: casehub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://casehub-web.onrender.com,http://localhost:5173
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false

  # ── PRODUCTION FRONTEND ──────────────────────────────────
  - type: web
    name: casehub-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://casehub-api.onrender.com
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
