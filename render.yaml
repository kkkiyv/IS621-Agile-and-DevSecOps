# Optional: deploy backend + Postgres on Render (free tier).
# After deploy, open Render Shell in the web service and run: npx prisma db seed
# Then set GitHub repo secret VITE_API_URL to the Render service URL.

databases:
  - name: casehub-db
    plan: free
    databaseName: casehub
    user: casehub

services:
  - type: web
    name: casehub-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: casehub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://kkkiyv.github.io,http://localhost:5173
